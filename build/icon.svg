<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="squircle">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
    <linearGradient id="blade-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cb8ff"/>
      <stop offset="100%" stop-color="#4a90e2"/>
    </linearGradient>
  </defs>

  <!-- Dark background squircle -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#121218"/>

  <!-- Subtle radial glow behind aperture -->
  <circle cx="256" cy="256" r="160" fill="url(#blade-gradient)" opacity="0.06"/>

  <!-- Aperture blades - 6 blades rotated 60° apart -->
  <g clip-path="url(#squircle)">
    <!-- Blade 1 (0°) -->
    <path d="M256 120 L330 170 L310 260 L240 240 Z" fill="#60a5fa" opacity="0.85"/>
    <!-- Blade 2 (60°) -->
    <path d="M256 120 L330 170 L310 260 L240 240 Z" fill="#60a5fa" opacity="0.7" transform="rotate(60 256 256)"/>
    <!-- Blade 3 (120°) -->
    <path d="M256 120 L330 170 L310 260 L240 240 Z" fill="#60a5fa" opacity="0.85" transform="rotate(120 256 256)"/>
    <!-- Blade 4 (180°) -->
    <path d="M256 120 L330 170 L310 260 L240 240 Z" fill="#60a5fa" opacity="0.7" transform="rotate(180 256 256)"/>
    <!-- Blade 5 (240°) -->
    <path d="M256 120 L330 170 L310 260 L240 240 Z" fill="#60a5fa" opacity="0.85" transform="rotate(240 256 256)"/>
    <!-- Blade 6 (300°) -->
    <path d="M256 120 L330 170 L310 260 L240 240 Z" fill="#60a5fa" opacity="0.7" transform="rotate(300 256 256)"/>
  </g>

  <!-- Central dark opening (the aperture hole) -->
  <circle cx="256" cy="256" r="52" fill="#121218"/>

  <!-- Thin bright ring around the opening for definition -->
  <circle cx="256" cy="256" r="54" fill="none" stroke="#7cb8ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Outer ring for the lens housing -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.2"/>
</svg>
