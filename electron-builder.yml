appId: com.crabbit.app
productName: Crabbit
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
asar: true

publish:
  provider: github

linux:
  target:
    - AppImage
  category: Network
  icon: build/icon.png

win:
  target:
    - nsis
  icon: build/icon.ico

mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.entertainment

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
